      function renderContacts(contacts) {
        const container = document.getElementById("contacts");
        container.innerHTML = "";
        contacts.forEach((contact) => {
          container.innerHTML += `
                <div style=""">
                    <h3>${contact.name.firstName}</h3>
                    <h3>${contact.name.lastName}</h3>

                    <p><strong>ID:</strong> ${contact.id}</p>
                    <p><strong>E-Mail:</strong> ${contact.email}</p>
                    <p><strong>Geburtstag:</strong> ${contact.birthDate}</p>
                    
                    <hr>
                    
                    <h4>Adresse:</h4>
                    <p>${contact.address.street} ${contact.address.number} <br>${contact.address.postcode}, ${contact.address.city}  </p>
                    
                    <hr>
                    
                    <h4>Telefon:</h4>
                    <ul>
